<!DOCTYPE html>
<html>
<head>
<title>Operation on string in Javascript</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Operation on string in Javascript</h1>

<textarea id="text" placeholder="Add paragraph here"></textarea>

<br>

<button class="result">Result</button>

<div class="buttons">

<button onclick="checkVowels()">Check Vowels</button>
<button onclick="checkConsonants()">Check consonents</button>
<button onclick="countSpaces()">Count spaces</button>
<button onclick="countNewLines()">Count new lines</button>
<button onclick="toLower()">Convert to small case</button>
<button onclick="capitalise()">Capitalise</button>
<button onclick="titleCase()">Title Case</button>
<button onclick="checkPalindrome()">Check palindrome</button>
<button onclick="extractFirst()">Extract First Word</button>
<button onclick="replaceHyphen()">Replace all spaces with hyphens</button>
<button onclick="reverseString()">Reverse the characters</button>
<button onclick="sortWords()">Sort the words</button>

</div>

<p id="output"></p>

<script src="script.js"></script>

</body>
</html>
